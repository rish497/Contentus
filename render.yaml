services:
  - type: web
    name: contentus
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CONTENTUS_MODE
        value: production
      - key: GOOGLE_REDIRECT_URI
        value: https://contentus.onrender.com/api/google/oauth/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SKIP_INSTALL_DEPS
        value: true
