services:
  - type: web
    name: contentus
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CONTENTUS_MODE
        value: production
      - key: GOOGLE_REDIRECT_URI
        value: https://contentus.onrender.com/api/google/oauth/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: FEATHERLESS_MODEL
        value: meta-llama/Meta-Llama-3.1-8B-Instruct
      - key: FEATHERLESS_VISION_MODEL
        value: Qwen/Qwen2.5-VL-72B-Instruct
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGE_MODEL
        value: gemini-2.0-flash-preview-image-generation
      - key: IMAGE_PROVIDER
        value: pollinations
      - key: YOUTUBE_DATA_API_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_MODEL
        value: eleven_multilingual_v2
      - key: ELEVENLABS_VOICE_ID
        value: 21m00Tcm4TlvDq8ikWAM
      - key: ELEVENLABS_MAX_CHARS
        value: 5000
      - key: SKIP_INSTALL_DEPS
        value: true
