<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contentus</title>
    <link rel="stylesheet" href="extension.css">
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main class="popup-shell">
      <header class="brand-row">
        <span class="dna-logo" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <path d="M14 7c10 0 20 8 20 17S24 41 14 41" />
            <path d="M34 7c-10 0-20 8-20 17s10 17 20 17" />
            <path d="M17 14h14M14 24h20M17 34h14" />
          </svg>
        </span>
        <div>
          <strong>Contentus</strong>
          <span>Creator DNA extension</span>
        </div>
      </header>

      <section class="context-card">
        <span class="eyebrow">Current page</span>
        <h1 id="page-title">Loading page...</h1>
        <p id="selection-preview">Highlight text on the page to use Make It Mine or Authenticity Check.</p>
      </section>

      <label for="notes">Notes</label>
      <textarea id="notes" rows="3" placeholder="Why is this useful inspiration?"></textarea>

      <div class="button-grid">
        <button data-action="save">Save to Contentus</button>
        <button data-action="analyze">Analyze Content</button>
        <button data-action="mine">Make It Mine</button>
        <button data-action="guard">Check Authenticity</button>
        <button data-action="caption">Quick Captions</button>
        <button data-action="sidepanel">Open Side Panel</button>
      </div>

      <section class="result-card" id="result">
        Use this as inspiration, not copying.
      </section>
    </main>
  </body>
</html>
